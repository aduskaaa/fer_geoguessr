<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interactive Map – Far East Russia</title>
    <meta name="description" content="High-precision interactive map viewer for the Far East Russia map mod.">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        :root {
            --header-h: 62px;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #080808;
            user-select: none;
        }

        main {
            height: calc(100vh - var(--header-h));
            position: relative;
            background: #080808;
        }

        #map-canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
            image-rendering: -webkit-optimize-contrast;
        }

        #map-canvas:active {
            cursor: grabbing;
        }

        /* ----- MODERN UI OVERLAYS ----- */
        .hud-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 100;
        }

        .hud-top-left h1 {
            font-size: 20px;
            margin: 0;
            color: var(--text-bright);
            letter-spacing: 1px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
        }

        .hud-top-left p {
            font-size: 11px;
            color: var(--muted);
            margin: 4px 0 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .loader {
            position: fixed;
            inset: 0;
            background: #080808;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <header class="header" id="site-header"></header>

    <main id="map-root">
        <div id="loading-screen" class="loader">
            <div class="spinner"></div>
            <p style="margin-top:20px; font-weight:800; font-size:12px; letter-spacing:2px; color:#fff;">SYNCHRONIZING
                MAP SECTORS...</p>
        </div>

        <div class="hud-top-left">
            <h1>INTERACTIVE MAP</h1>
            <p>Far East Russia • Map Version 1</p>
        </div>

        <canvas id="map-canvas"></canvas>

        <!-- Hidden Context Menu -->
        <div id="ctx-menu" style="position: absolute; display: none; background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto; min-width: 150px;">
            <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Map Coordinates</div>
            <div id="coords-display" style="font-family: monospace; font-size: 11px; color: #fff; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; user-select: all; line-height: 1.4;">0, 0</div>
            <button onclick="copyCoords()" style="width: 100%; background: var(--accent); border: none; color: #fff; padding: 8px; border-radius: 4px; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase;">Copy to Clipboard</button>
        </div>

        <!-- Bottom Layers Bar -->
        <div style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(14,14,14,0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; padding: 10px 30px; display: flex; gap: 30px; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 500;">
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <input type="checkbox" id="toggle-photos" checked style="accent-color: var(--accent);">
                <span style="font-size: 11px; font-weight: 800; color: #eee; text-transform: uppercase; letter-spacing: 1px;">User Photos</span>
            </label>
            <div style="width: 1px; height: 15px; background: rgba(255,255,255,0.1);"></div>
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <input type="checkbox" id="toggle-road-names" checked style="accent-color: var(--accent);">
                <span style="font-size: 11px; font-weight: 800; color: #eee; text-transform: uppercase; letter-spacing: 1px;">Road Names</span>
            </label>
            <div style="width: 1px; height: 15px; background: rgba(255,255,255,0.1);"></div>
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <input type="checkbox" id="toggle-background" checked style="accent-color: var(--accent);">
                <span style="font-size: 11px; font-weight: 800; color: #eee; text-transform: uppercase; letter-spacing: 1px;">Background Image</span>
            </label>
            <div style="width: 1px; height: 15px; background: rgba(255,255,255,0.1);"></div>
            <div style="font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase;">Right-click to get coordinates</div>
        </div>

        <!-- Hidden Calibration (kept for internal engine state) -->
        <div style="display: none;">
            <input type="range" id="slider-ox" value="0">
            <input type="range" id="slider-oy" value="0">
            <input type="range" id="slider-sx" value="45.0">
            <input type="range" id="slider-sy" value="-110.0">
            <input type="range" id="slider-rot" value="0">
        </div>

        <!-- Photo Modal -->
        <div id="photo-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; backdrop-filter: blur(5px);">
            <button onclick="closeModal()" style="position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 40px; cursor: pointer; line-height: 1;">&times;</button>
            <div style="max-width: 90%; max-height: 80%; display: flex; flex-direction: column; align-items: center; gap: 20px;">
                <img id="modal-img" src="" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.1);">
                <div style="text-align: center; color: #fff; width: 100%;">
                    <h2 id="modal-title" style="margin: 0; font-size: 20px; letter-spacing: 1px;">Photo Title</h2>
                    <p id="modal-desc" style="color: var(--muted); margin: 8px 0; font-size: 13px; font-style: italic;">Description text here...</p>
                    <div id="modal-user" style="font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase;">By User123</div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/site-data.js"></script>
    <script src="assets/site-renderer.js"></script>
    <script src="assets/custom-companies.js"></script>
    <script src="assets/user-photos.js"></script>
    <script src="assets/Interactive Map/Map DATA/fer-geojson.js"></script>
    <script src="assets/Interactive Map/Map DATA/fer-road-names.js"></script>
    <script src="assets/interactive-map.js"></script>

    <script>
        function closeModal() {
            document.getElementById('photo-modal').style.display = 'none';
        }

        function copyCoords() {
            const display = document.getElementById('coords-display');
            const text = display.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'COPIED!';
                btn.style.background = '#2ecc71';
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = '';
                }, 1500);
            });
        }
    </script>
</body>

</html>
