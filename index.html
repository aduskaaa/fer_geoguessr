<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FER GeoGuessr – Far East Russia</title>
    <link rel="icon" href="favicon.ico">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --header-h: 60px;
            --accent: #2ecc71;
            --accent-dark: #27ae60;
            --danger: #e74c3c;
            --bg: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            user-select: none;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* ----- HEADER ----- */
        .header {
            height: var(--header-h);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: relative;
            z-index: 1100;
        }

        .header h2 {
            margin: 0;
            font-size: 16px;
            letter-spacing: 4px;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ----- HUD ----- */
        .hud-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .hud-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }

        .room-badge {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* ----- PHOTO BACKGROUND ----- */
        #photo-background {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        #photo-loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 2;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ----- FLOATING MAP ----- */
        #map-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 320px;
            height: 220px;
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 1000;
            background: var(--bg);
        }

        #map-container:hover {
            width: 550px;
            height: 380px;
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        #map-canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        /* ----- BUTTONS ----- */
        .btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #2ecc71;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        .btn:disabled {
            background: #333;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .btn-danger {
            background: var(--danger);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        /* ----- TIMER ----- */
        #timer-info {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 8px 30px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            z-index: 1000;
            display: none;
            transition: all 0.3s ease;
        }

        .timer-low {
            color: var(--danger);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: translateX(-50%) scale(1);
            }

            50% {
                transform: translateX(-50%) scale(1.1);
            }

            100% {
                transform: translateX(-50%) scale(1);
            }
        }

        /* ----- MODALS ----- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8);
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 800;
            color: #666;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            margin-top: 8px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent);
            outline: none;
        }

        /* ----- SCOREBOARD ----- */
        #scoreboard {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            z-index: 3000;
            width: 450px;
            display: none;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        #round-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 10px 40px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            font-weight: 900;
            letter-spacing: 3px;
            z-index: 1000;
            font-size: 14px;
        }

        /* ----- PLAYER BADGES ----- */
        .player-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <header class="header">
        <h2>FAR EAST RUSSIA GEOGUESSR</h2>
        <button id="btn-leave" class="btn btn-secondary" style="padding: 8px 15px; font-size: 10px; display: none;"
            onclick="location.reload()">Leave Game</button>
    </header>

    <main id="map-root">
        <div id="loading-screen"
            style="position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div class="spinner"></div>
            <p style="margin-top:20px; font-weight:900; letter-spacing:4px; font-size:12px;">INITIALIZING MAP ENGINE</p>
        </div>

        <div id="round-info" style="display: none;">ROUND 1 / 5</div>
        <div id="timer-info">1:00</div>

        <div class="hud-top-left">
            <p id="player-name-display"
                style="color: var(--accent); margin: 0; font-weight: 900; font-size: 12px; letter-spacing: 2px;">PLAYER:
                -</p>
        </div>

        <div class="hud-top-right">
            <div id="room-id-badge" class="room-badge" style="display: none; cursor: pointer;" onclick="copyRoomCode()"
                title="Click to copy">
                ROOM: <span id="room-id-text" style="color: var(--accent); font-family: monospace;">-</span>
                <span id="copy-status" style="font-size: 8px; margin-left: 8px; opacity: 0.5;">(CLICK TO COPY)</span>
            </div>
            <div id="players-count-badge" class="room-badge" style="display: none;"><span
                    id="players-count-text">1</span> PLAYERS</div>
        </div>

        <div id="photo-loader">
            <div class="spinner"></div>
        </div>
        <img id="photo-background" src="" alt="Photo"
            onload="document.getElementById('photo-loader').style.display='none'; this.style.opacity=1;">

        <div id="map-container">
            <canvas id="map-canvas"></canvas>
            <div
                style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; color: #fff; font-size: 10px; font-weight: 800; border: 1px solid var(--glass-border); pointer-events: none;">
                INTERACTIVE MAP</div>
            <div
                style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 6px; display: flex; gap: 10px; z-index: 1001;">
                <label style="font-size: 9px; display: flex; align-items: center; gap: 4px; cursor: pointer;">
                    <input type="checkbox" id="toggle-background" checked style="margin: 0;"> BG
                </label>
                <label style="font-size: 9px; display: flex; align-items: center; gap: 4px; cursor: pointer;">
                    <input type="checkbox" id="toggle-road-names" checked style="margin: 0;"> ROADS
                </label>
            </div>
        </div>

        <div id="game-controls" style="position: absolute; bottom: 30px; left: 30px; z-index: 1000;">
            <button id="btn-submit" class="btn" disabled onclick="submitGuess()">Submit Guess</button>
        </div>

        <!-- Lobby Modal -->
        <div id="lobby-modal" class="modal">
            <div class="modal-content">
                <h2 style="margin-top: 0; letter-spacing: 2px;">LOBBY</h2>

                <div id="lobby-room-display"
                    style="display: none; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px dashed rgba(255,255,255,0.1);">
                    <div
                        style="color: #666; font-size: 10px; text-transform: uppercase; font-weight: 900; margin-bottom: 8px;">
                        Room Code</div>
                    <div id="lobby-room-id"
                        style="color: var(--accent); font-size: 32px; font-weight: 900; font-family: monospace;">-</div>
                    <button class="btn btn-secondary" style="margin-top: 15px; padding: 10px 20px; font-size: 11px;"
                        onclick="copyRoomCode()">Copy Code</button>
                </div>

                <div id="lobby-initial-controls">
                    <div class="input-group">
                        <label>YOUR NAME</label>
                        <input type="text" id="input-player-name" placeholder="Enter name...">
                    </div>
                    <div style="display: flex; gap: 15px; margin-top: 25px;">
                        <button class="btn" style="flex: 1;" onclick="createRoom()">Create</button>
                        <button class="btn btn-secondary" style="flex: 1;" onclick="showJoinInput()">Join</button>
                    </div>
                    <div id="join-input-group"
                        style="display: none; margin-top: 25px; border-top: 1px solid #222; padding-top: 20px;">
                        <div class="input-group">
                            <label>ROOM ID</label>
                            <input type="text" id="input-room-id" placeholder="Paste code here...">
                        </div>
                        <button class="btn" style="width: 100%; margin-top: 15px;" onclick="joinRoom()">Connect</button>
                    </div>
                </div>

                <div id="lobby-waiting-controls" style="display: none;">
                    <div style="text-align: left; margin-bottom: 20px;">
                        <label style="font-size: 11px; font-weight: 900; color: #555;">PLAYERS IN LOBBY</label>
                        <div id="players-list-container"
                            style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;"></div>
                    </div>
                    <button id="btn-start-game" class="btn" style="width: 100%;" onclick="hostStartGame()">Start
                        Game</button>
                    <p id="client-wait-msg" style="color: #444; font-size: 12px; margin-top: 15px; display: none;">
                        Waiting for host to start...</p>
                </div>
            </div>
        </div>

        <!-- Scoreboard -->
        <div id="scoreboard">
            <h2 id="scoreboard-title" style="margin-top: 0; letter-spacing: 2px;">ROUND RESULTS</h2>
            <div id="score-list" style="margin: 25px 0;"></div>
            <div id="host-controls" style="display: none;">
                <button class="btn" style="width: 100%;" onclick="hostNextRound()">Next Round</button>
            </div>
            <p id="waiting-msg" style="color: #666; font-size: 12px; margin-top: 20px; font-weight: 700;">WAITING FOR
                HOST...</p>
        </div>
    </main>

    <script src="assets/user-photos.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/aduskaaa/aduskaaa@main/imgs/streetview/data.js"></script>
    <script src="assets/Interactive Map/Map DATA/fer-geojson.js"></script>
    <script src="assets/Interactive Map/Map DATA/fer-road-names.js"></script>
    <script src="assets/interactive-map.js"></script>
    <script src="assets/geoguessr.js"></script>

    <script>
        function showJoinInput() { document.getElementById('join-input-group').style.display = 'block'; }
    </script>
</body>

</html>
